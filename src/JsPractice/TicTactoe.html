<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .main {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        color: #333;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 10px;
        justify-content: center;
    }

    .cell {
        width: 100px;
        height: 100px;
        font-size: 2rem;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #f0f0f0;
        transition: 0.2s ease;
    }

    .cell:hover {
        background: #dcdcdc;
        transform: scale(1.05);
    }

    .status {
        margin-top: 20px;
        font-size: 18px;
        color: #555;
    }

    .reset-btn {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background: #4facfe;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    .reset-btn:hover {
        background: #007bff;
    }
</style>

<body>
    <div class="main">
        <h1>Tic Tac Toe</h1>

        <div class="container">
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
            <button class="cell"></button>
        </div>

        <div class="status">Player X's Turn</div>
        <button class="reset-btn">Reset Game</button>
    </div>

    <script src="./TicTacToe.js"></script>
</body>
</html>
